<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Objetivos 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="conteudo-principal">

    <h2 class="titulo-principal">
        Objetivos para 2026 <span>_</span>
    </h2>

    <div class="botoes">
        <button class="botao botao-ativo">Fazer ENEM</button>
        <button class="botao">Terminar Ensino Médio</button>
        <button class="botao">Formatura</button>
        <button class="botao">Mudar para São Paulo</button>
    </div>

    <div class="abas-texto">

        <div class="aba-conteudo conteudo-ativo">
            <h3 class="aba-conteudo-titulo-principal">Fazer ENEM</h3>

            <div class="contador">
                <div class="contador-digito">
                    <p id="dias0" class="contador-digito-numero">0</p>
                    <p class="contador-digito-texto">Dias</p>
                </div>

                <div class="contador-digito">
                    <p id="horas0" class="contador-digito-numero">0</p>
                    <p class="contador-digito-texto">Horas</p>
                </div>

                <div class="contador-digito">
                    <p id="min0" class="contador-digito-numero">0</p>
                    <p class="contador-digito-texto">Min</p>
                </div>

                <div class="contador-digito">
                    <p id="seg0" class="contador-digito-numero">0</p>
                    <p class="contador-digito-texto">Seg</p>
                </div>
            </div>
        </div>

        <div class="aba-conteudo">
            <h3 class="aba-conteudo-titulo-principal">Terminar Ensino Médio</h3>

            <div class="contador">
                <div class="contador-digito">
                    <p id="dias1" class="contador-digito-numero">0</p>
                    <p class="contador-digito-texto">Dias</p>
                </div>

                <div class="contador-digito">
                    <p id="horas1" class="contador-digito-numero">0</p>
                    <p class="contador-digito-texto">Horas</p>
                </div>

                <div class="contador-digito">
                    <p id="min1" class="contador-digito-numero">0</p>
                    <p class="contador-digito-texto">Min</p>
                </div>

                <div class="contador-digito">
                    <p id="seg1" class="contador-digito-numero">0</p>
                    <p class="contador-digito-texto">Seg</p>
                </div>
            </div>
        </div>

        <div class="aba-conteudo">
            <h3 class="aba-conteudo-titulo-principal">Formatura</h3>

            <div class="contador">
                <div class="contador-digito">
                    <p id="dias2" class="contador-digito-numero">0</p>
                    <p class="contador-digito-texto">Dias</p>
                </div>

                <div class="contador-digito">
                    <p id="horas2" class="contador-digito-numero">0</p>
                    <p class="contador-digito-texto">Horas</p>
                </div>

                <div class="contador-digito">
                    <p id="min2" class="contador-digito-numero">0</p>
                    <p class="contador-digito-texto">Min</p>
                </div>

                <div class="contador-digito">
                    <p id="seg2" class="contador-digito-numero">0</p>
                    <p class="contador-digito-texto">Seg</p>
                </div>
            </div>
        </div>

        <div class="aba-conteudo">
            <h3 class="aba-conteudo-titulo-principal">Mudar para São Paulo</h3>

            <div class="contador">
                <div class="contador-digito">
                    <p id="dias3" class="contador-digito-numero">0</p>
                    <p class="contador-digito-texto">Dias</p>
                </div>

                <div class="contador-digito">
                    <p id="horas3" class="contador-digito-numero">0</p>
                    <p class="contador-digito-texto">Horas</p>
                </div>

                <div class="contador-digito">
                    <p id="min3" class="contador-digito-numero">0</p>
                    <p class="contador-digito-texto">Min</p>
                </div>

                <div class="contador-digito">
                    <p id="seg3" class="contador-digito-numero">0</p>
                    <p class="contador-digito-texto">Seg</p>
                </div>
            </div>
        </div>

    </div>

</section>

<script src="script.js"></script>
</body>
</html>
